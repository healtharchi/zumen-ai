<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;
const APP_DATA_INITIAL = JSON.parse(document.getElementById('app-data').textContent);
const LS_KEY = "kentiku_estimate_v1_0";
const LS_MASTER_KEY = "kentiku_master_v1_0";

// ============ ユーティリティ ============
function uuid() {
  return 'id-' + Math.random().toString(36).slice(2, 10) + '-' + Date.now().toString(36);
}

function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return "—";
  return Math.round(n).toLocaleString('ja-JP');
}

function fmtDate(iso) {
  if (!iso) return "";
  return iso.slice(0, 10);
}

// 施主名から末尾の敬称(様/さま/殿/御中)を除去して返す
function cleanClientName(name) {
  if (!name) return '';
  return String(name).replace(/[\s　]*(様|さま|サマ|殿|御中)$/, '').trim();
}

// 連番 → アルファベット列コード (1→A, 26→Z, 27→AA, 28→AB, ... 53→BA, ...)
// Excelの列名と同じ規則
function codeFromNumber(n) {
  let s = '';
  while (n > 0) {
    n--;
    s = String.fromCharCode(65 + (n % 26)) + s;
    n = Math.floor(n / 26);
  }
  return s;
}

// 使用済みコードを除外して、次に利用可能なカテゴリーコードを返す
// 既存のA,B,...,AB に続けて AC, AD, ... と振る。万一抜けがあっても若い順に詰める。
function nextAvailableCategoryCode(usedCodes) {
  const used = new Set((usedCodes || []).map(c => String(c).toUpperCase()));
  for (let i = 1; i < 10000; i++) {
    const code = codeFromNumber(i);
    if (!used.has(code)) return code;
  }
  // 念のためフォールバック
  return 'X' + Date.now().toString(36).toUpperCase();
}

// ソート用比較: 短いコードを先に、同じ長さなら辞書順 (A < B < ... < Z < AA < AB ...)
function compareCategoryCode(a, b) {
  const sa = String(a || ''); const sb = String(b || '');
  if (sa.length !== sb.length) return sa.length - sb.length;
  return sa < sb ? -1 : sa > sb ? 1 : 0;
}

// 区分(本体工事/付帯工事/諸経費)の並び順ランク。新規追加カテゴリを区分の末尾に配置するために使用。
function sectionRank(category) {
  return category === '本体工事' ? 0 : category === '付帯工事' ? 1 : category === '諸経費' ? 2 : 99;
}

// グループ配列を「区分ごと」に安定ソート(区分内の元の出現順は維持)。
// これにより、末尾に追加された新カテゴリも自分の区分の最後に表示される。
function sortGroupsBySection(groupArray) {
  return groupArray
    .map((grp, i) => ({ grp, i }))
    .sort((a, b) => {
      const ra = sectionRank(a.grp.category);
      const rb = sectionRank(b.grp.category);
      if (ra !== rb) return ra - rb;
      return a.i - b.i; // 同区分内は元の順序を維持(安定ソート)
    })
    .map(x => x.grp);
}

// ============ 計算エンジン ============
function computeScaleParams(input) {
  const t = parseFloat(input.tsuboFloor) || 32;
  const f = parseFloat(input.floorCount) || 2;
  const h = parseFloat(input.eavesHeight) || (f === 1 ? 3.5 : f === 3 ? 9.5 : 6.5);

  // 建物形状 → 不整形係数
  const shapeMap = { "正方形": 1.00, "長方形": 0.89, "L字型": 0.82, "コの字型": 0.76 };
  const buildingShape = input.buildingShape || "長方形";
  const irregularFactor = shapeMap[buildingShape] || 0.89;

  // 建築面積の決定 (優先順: 直接入力 > 1階面積 > 延床÷階数)
  const totalFloorArea = t * 3.3058; // 延床面積㎡
  const baManual = parseFloat(input.buildingAreaInput);
  const f1Manual = parseFloat(input.floor1Area);
  const f2Manual = parseFloat(input.floor2Area);
  const f3Manual = parseFloat(input.floor3Area);

  let buildingArea; // 建築面積=1階の床面積
  let buildingAreaSource = 'auto';
  if (!isNaN(baManual) && baManual > 0) {
    buildingArea = baManual;
    buildingAreaSource = 'direct';
  } else if (!isNaN(f1Manual) && f1Manual > 0) {
    buildingArea = f1Manual;
    buildingAreaSource = 'floor1';
  } else {
    // 階数で均等分配 (粗い概算)
    buildingArea = totalFloorArea / f;
  }

  // 軒高+2.0mを外壁高さとして使用 (足場、外壁、断熱壁の計算用)
  const wallHeight = h + 2.0;

  // 派生値の手動上書き対応
  const autoPerimeter = Math.sqrt(buildingArea) * 4 * irregularFactor;
  const perimeter = (input.manualPerimeter && parseFloat(input.manualPerimeter) > 0)
    ? parseFloat(input.manualPerimeter) : autoPerimeter;

  const autoWallArea = perimeter * wallHeight * 0.75;
  const wallArea = (input.manualWallArea && parseFloat(input.manualWallArea) > 0)
    ? parseFloat(input.manualWallArea) : autoWallArea;

  const roofShapeMap = { "切妻": 1.32, "寄棟": 1.40, "片流れ": 1.20, "陸屋根": 1.05 };
  const roofShape = input.roofShape || "切妻";
  const autoRoofArea = buildingArea * (roofShapeMap[roofShape] || 1.32);
  const roofArea = (input.manualRoofArea && parseFloat(input.manualRoofArea) > 0)
    ? parseFloat(input.manualRoofArea) : autoRoofArea;

  const innerFloorArea = totalFloorArea * 0.80;

  return {
    tsuboFloor: t,
    floorCount: f,
    eavesHeight: h,
    wallHeight,       // 軒高+2.0m (計算用)
    buildingShape,
    irregularFactor,
    roofShape,
    buildingArea,
    perimeter,
    autoPerimeter,
    totalFloorArea,
    wallArea,
    autoWallArea,
    roofArea,
    autoRoofArea,
    innerFloorArea,
    floor1Manual: !isNaN(f1Manual) && f1Manual > 0,
    buildingAreaSource,
    buildingAreaManual: buildingAreaSource !== 'auto',
    perimeterManual: !!(input.manualPerimeter && parseFloat(input.manualPerimeter) > 0),
    wallAreaManual: !!(input.manualWallArea && parseFloat(input.manualWallArea) > 0),
    roofAreaManual: !!(input.manualRoofArea && parseFloat(input.manualRoofArea) > 0)
  };
}

function evalQuantityFormula(formula, sp) {
  if (!formula) return 1;
  let expr = String(formula).replace(/^=/, '').replace(/×/g, '*');
  const vars = {
    "延床坪数": sp.tsuboFloor, "階数": sp.floorCount,
    "軒高": sp.wallHeight,  // 計算式の「軒高」は内部で「外壁高さ(軒高+2.0m)」を使用
    "建築面積": sp.buildingArea, "外周長": sp.perimeter, "延床面積": sp.totalFloorArea,
    "外壁面積": sp.wallArea, "屋根面積": sp.roofArea, "内装床面積": sp.innerFloorArea
  };
  for (const [name, val] of Object.entries(vars)) {
    expr = expr.split(name).join(String(val));
  }
  expr = expr.replace(/IF\(([^,]+),([^,]+),([^)]+)\)/g, (_, cond, t, f) => {
    try { return new Function('return (' + cond + ') ? (' + t + ') : (' + f + ')')(); } catch (e) { return f; }
  });
  try {
    const result = new Function('return ' + expr)();
    return typeof result === 'number' && isFinite(result) ? result : 1;
  } catch (e) { return 1; }
}

function getEffectivePrice(item, manualOverride) {
  if (manualOverride !== undefined && manualOverride !== null && manualOverride !== '') {
    return { price: parseFloat(manualOverride) || 0, source: 'manual' };
  }
  return { price: item.price, source: 'default' };
}

function computeEstimate(project, masters) {
  const sp = computeScaleParams(project.scale);
  // スナップショットがあればそれを優先、なければマスタを使う(後方互換)
  const effectiveRateMaster = project.rateMasterSnapshot || masters.rateMaster;

  const lines = effectiveRateMaster.map(item => {
    const enabled = !(project.excludedItems || []).includes(item.no) && !item.disabled;
    const autoQuantity = evalQuantityFormula(item.quantityFormula, sp);
    const manualQty = (project.manualQuantities || {})[item.no];
    const quantity = (manualQty !== undefined && manualQty !== null && manualQty !== '') ? parseFloat(manualQty) : autoQuantity;
    const quantitySource = (manualQty !== undefined && manualQty !== null && manualQty !== '') ? 'manual' : 'auto';
    const manualOverride = (project.manualPrices || {})[item.no];
    const priceInfo = getEffectivePrice(item, manualOverride);
    const amount = enabled ? Math.round(quantity * priceInfo.price) : 0;
    return { ...item, quantity, autoQuantity, quantitySource, effectivePrice: priceInfo.price, priceSource: priceInfo.source, enabled, masterDisabled: !!item.disabled, amount };
  });

  const customLines = (project.customItems || []).map(c => {
    const qty = c.quantity === '' || c.quantity === null || c.quantity === undefined ? 0 : (parseFloat(c.quantity) || 0);
    const price = c.price === '' || c.price === null || c.price === undefined ? 0 : (parseFloat(c.price) || 0);
    return {
      no: c.no || ('*-' + (c.id || '').slice(-3)),
      category: c.category || "本体工事",
      categoryGroup: c.categoryGroup || "M",
      categoryName: c.categoryName || "カスタム",
      name: c.name !== undefined && c.name !== null ? c.name : '',
      spec: c.spec !== undefined && c.spec !== null ? c.spec : '',
      quantity: qty,
      autoQuantity: qty,
      quantitySource: 'custom',
      unit: c.unit !== undefined && c.unit !== null ? c.unit : '式',
      effectivePrice: price,
      priceSource: 'custom',
      enabled: c.enabled !== false,
      amount: (c.enabled !== false) ? Math.round(qty * price) : 0,
      isCustom: true,
      customId: c.id,
      remark: c.remark || ""
    };
  });

  const allLines = [...lines, ...customLines];

  // 表示用連番を付与
  // - マスタで無効化された項目はカウントから除外（元の番号を保持、UIでは非表示）
  // - 案件単位で無効化された(enabled=false)項目もカウントから除外
  // - 有効な項目だけに連番を振る
  const displayCounters = {};
  allLines.forEach(l => {
    if (l.masterDisabled || !l.enabled) {
      l.displayNo = l.no; // 表示しない/番号ふらない、内部キーをそのまま使う
      return;
    }
    const g = l.categoryGroup;
    displayCounters[g] = (displayCounters[g] || 0) + 1;
    l.displayNo = `${g}-${displayCounters[g]}`;
  });

  const bodyTotal = allLines.filter(l => l.category === '本体工事').reduce((s, l) => s + l.amount, 0);
  const sideTotal = allLines.filter(l => l.category === '付帯工事').reduce((s, l) => s + l.amount, 0);
  const overheadTotal = allLines.filter(l => l.category === '諸経費').reduce((s, l) => s + l.amount, 0);

  const optionsTotal = (project.options || []).reduce((s, o) => s + (parseFloat(o.amount) || 0), 0);
  const subtotal = bodyTotal + sideTotal + overheadTotal + optionsTotal;
  const tax = Math.round(subtotal * 0.1);
  const total = subtotal + tax;
  const tsuboCost = sp.tsuboFloor > 0 ? total / sp.tsuboFloor : 0;

  return { scale: sp, lines: allLines, bodyTotal, sideTotal, overheadTotal, optionsTotal, subtotal, tax, total, tsuboCost };
}

// ============ Storage ============
function loadAll() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (!parsed.properties) parsed.properties = [];
      return parsed;
    }
  } catch (e) {}
  return { projects: [], properties: [], companyInfo: { name: '', address: '', phone: '', email: '', representative: '', stampImage: '' } };
}
function saveAll(state) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) { console.error(e); }
}
function loadMasters() {
  try {
    const raw = localStorage.getItem(LS_MASTER_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // 古いデータから不要なフィールドを除去
      return { rateMaster: parsed.rateMaster || APP_DATA_INITIAL.rateMaster };
    }
  } catch (e) {}
  return {
    rateMaster: APP_DATA_INITIAL.rateMaster
  };
}
function saveMasters(masters) {
  try { localStorage.setItem(LS_MASTER_KEY, JSON.stringify(masters)); } catch (e) { console.error(e); }
}

function defaultProject(name, masters) {
  return {
    id: uuid(),
    name: name || '第1回見積',
    propertyName: '',
    revisionNumber: 1,
    memo: '',
    clientName: '', siteAddress: '', staffName: '',
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
    rateMasterSnapshot: JSON.parse(JSON.stringify(masters.rateMaster)),
    snapshotAt: new Date().toISOString(),
    scale: {
      tsuboFloor: 32,
      floorCount: 2,
      eavesHeight: 6.5,
      buildingShape: '長方形',
      roofShape: '切妻',
      buildingAreaInput: '',
      floor1Area: '',
      floor2Area: '',
      floor3Area: '',
      manualPerimeter: '',
      manualWallArea: '',
      manualRoofArea: ''
    },
    excludedItems: [],
    customItems: [],
    manualPrices: {},
    manualQuantities: {},
    options: [],
    printFormat: 'standard'
  };
}

// ============ Components ============
function App() {
  const [state, setState] = useState(loadAll);
  const [masters, setMasters] = useState(loadMasters);
  const [view, setView] = useState({ name: 'property-list' });
  const [savedAt, setSavedAt] = useState(null);

  useEffect(() => { saveAll(state); setSavedAt(new Date()); }, [state]);
  useEffect(() => { saveMasters(masters); }, [masters]);

  const updateProject = (id, updater) => {
    setState(s => ({
      ...s,
      projects: s.projects.map(p =>
        p.id === id ? { ...updater(p), updatedAt: new Date().toISOString() } : p
      )
    }));
  };

  // 物件のみ新規登録 (見積は作らない)
  const addProperty = () => {
    const name = prompt('物件名を入力してください', '');
    if (!name) return;
    const trimmed = name.trim();
    if (!trimmed) return;
    // 既存物件名と重複チェック
    const exists = (state.properties || []).some(prop => prop.name === trimmed) ||
                   state.projects.some(p => p.propertyName === trimmed);
    if (exists) { alert('同名の物件が既に存在します'); return; }
    setState(s => ({
      ...s,
      properties: [...(s.properties || []), { name: trimmed, createdAt: new Date().toISOString() }]
    }));
    // 登録後、その物件の見積一覧に遷移
    setView({ name: 'list', propertyName: trimmed });
  };

  // 指定した物件で新規見積を作る
  const addProjectForProperty = (propertyName) => {
    // 同じ物件の見積数を数えて名前を決める
    const sameCount = state.projects.filter(p => (p.propertyName || '') === (propertyName || '')).length;
    const newName = sameCount === 0 ? '第1回見積' : `第${sameCount + 1}回見積`;
    const p = defaultProject(newName, masters);
    p.propertyName = propertyName || '';
    p.revisionNumber = sameCount + 1;
    setState(s => ({ ...s, projects: [p, ...s.projects] }));
    setView({ name: 'edit', id: p.id });
  };

  const duplicateProject = (id) => {
    const orig = state.projects.find(p => p.id === id); if (!orig) return;
    const propertyKey = orig.propertyName || orig.id;
    const sameCount = state.projects.filter(p => (p.propertyName || p.id) === propertyKey).length;
    const copy = {
      ...JSON.parse(JSON.stringify(orig)),
      id: uuid(),
      revisionNumber: sameCount + 1,
      name: `第${sameCount + 1}回見積`,
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString()
    };
    setState(s => ({ ...s, projects: [copy, ...s.projects] }));
  };
  const deleteProject = (id) => {
    if (!confirm('この見積を削除しますか?')) return;
    setState(s => ({ ...s, projects: s.projects.filter(p => p.id !== id) }));
  };
  const renameProject = (id) => {
    const p = state.projects.find(x => x.id === id);
    const newName = prompt('見積名', p?.name || ''); if (!newName) return;
    updateProject(id, p => ({ ...p, name: newName }));
  };
  const refreshSnapshot = (id) => {
    const p = state.projects.find(x => x.id === id);
    if (!p) return;
    const itemCount = masters.rateMaster.length;
    const oldCount = (p.rateMasterSnapshot || []).length;
    if (!confirm(`この見積の単価マスタを最新版（${itemCount}項目）に更新しますか?\n\n現在この見積に取り込まれているマスタ: ${oldCount}項目\n${p.snapshotAt ? `取り込み日時: ${fmtDate(p.snapshotAt)}` : '(未取り込み)'}\n\n※ 手動編集した数量・単価はそのまま残ります。\n※ カスタム追加項目もそのまま残ります。`)) return;
    updateProject(id, p => ({
      ...p,
      rateMasterSnapshot: JSON.parse(JSON.stringify(masters.rateMaster)),
      snapshotAt: new Date().toISOString()
    }));
    alert('マスタを最新に更新しました。');
  };
  const deleteProperty = (propName) => {
    if (!confirm(`「${propName}」と、その物件のすべての見積を削除しますか?この操作は取り消せません。`)) return;
    setState(s => ({
      ...s,
      properties: (s.properties || []).filter(prop => prop.name !== propName),
      projects: s.projects.filter(p => (p.propertyName || '(物件名なし)') !== propName)
    }));
  };
  const renameProperty = (oldName) => {
    const newName = prompt('物件名を変更', oldName === '(物件名なし)' ? '' : oldName);
    if (newName === null) return;
    const trimmed = newName.trim();
    setState(s => ({
      ...s,
      properties: (s.properties || []).map(prop =>
        prop.name === oldName ? { ...prop, name: trimmed } : prop
      ),
      projects: s.projects.map(p =>
        (p.propertyName || '(物件名なし)') === oldName
          ? { ...p, propertyName: trimmed, updatedAt: new Date().toISOString() }
          : p
      )
    }));
  };

  return (
    <div className="min-h-screen flex flex-col">
      <Header view={view} setView={setView} savedAt={savedAt} />
      <main className="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 py-6">
        {view.name === 'property-list' && (
          <PropertyList projects={state.projects} properties={state.properties || []} masters={masters}
            onOpen={(propName) => setView({ name: 'list', propertyName: propName })}
            onAddProperty={addProperty}
            onDeleteProperty={deleteProperty}
            onRenameProperty={renameProperty} />
        )}
        {view.name === 'list' && (
          <ProjectList projects={state.projects} masters={masters}
            propertyFilter={view.propertyName}
            onBack={() => setView({ name: 'property-list' })}
            onOpen={id => setView({ name: 'edit', id })}
            onAdd={() => addProjectForProperty(view.propertyName === '(物件名なし)' ? '' : view.propertyName)}
            onDuplicate={duplicateProject}
            onDelete={deleteProject} onRename={renameProject}
            onUpdateMemo={(id, memo) => updateProject(id, p => ({ ...p, memo }))} />
        )}
        {view.name === 'edit' && (
          <ProjectEditor
            project={state.projects.find(p => p.id === view.id)}
            masters={masters}
            companyInfo={state.companyInfo}
            onChange={updater => updateProject(view.id, updater)}
            onRefreshSnapshot={() => refreshSnapshot(view.id)}
            onBack={() => {
              const p = state.projects.find(p => p.id === view.id);
              setView({ name: 'list', propertyName: p?.propertyName || '(物件名なし)' });
            }} />
        )}
        {view.name === 'masters' && (
          <MasterManager masters={masters} setMasters={setMasters} />
        )}
        {view.name === 'settings' && (
          <Settings state={state} setState={setState} masters={masters} setMasters={setMasters} />
        )}
      </main>
      <footer className="border-t border-slate-200 bg-white text-xs text-slate-500 py-3 text-center no-print">
        v1.0 / データはブラウザ内に保存されます / 初期値: 2026年5月 首都圏中級32坪 標準仕様
      </footer>
    </div>
  );
}

function Header({ view, setView, savedAt }) {
  const navs = [
    { id: 'property-list', label: '物件一覧', icon: '📁' },
    { id: 'masters', label: 'マスタ管理', icon: '⚙️' },
    { id: 'settings', label: '設定', icon: '🔧' }
  ];
  return (
    <header className="bg-white border-b border-slate-200 no-print">
      <div className="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between flex-wrap gap-2">
        <div className="flex items-center gap-3">
          <div className="text-base sm:text-lg font-bold text-slate-900">🏠 スマート見積<span className="text-[#C85400]">＋図面AI</span></div>
          <div className="text-xs font-bold text-white bg-[#C85400] px-2 py-0.5 rounded">🧪実験版</div>
        </div>
        <nav className="flex gap-1 items-center">
          {navs.map(n => {
            const isActive = view.name === n.id ||
              (n.id === 'property-list' && (view.name === 'list' || view.name === 'edit'));
            return (
              <button key={n.id} onClick={() => setView({ name: n.id })}
                className={`px-2 sm:px-3 py-1.5 text-xs sm:text-sm rounded transition ${
                  isActive ? 'bg-slate-900 text-white' : 'text-slate-600 hover:bg-slate-100'
                }`}>
                <span className="mr-1">{n.icon}</span>
                <span className="hidden sm:inline">{n.label}</span>
              </button>
            );
          })}
          <a href="guide.html" target="_blank" rel="noopener"
            className="px-2 sm:px-3 py-1.5 text-xs sm:text-sm rounded transition text-blue-700 hover:bg-blue-50 border border-blue-200"
            title="新しいタブで使い方ガイドを開く">
            <span className="mr-1">📖</span>
            <span className="hidden sm:inline">使い方ガイド</span>
          </a>
        </nav>
        {savedAt && (
          <div className="text-xs text-slate-400 w-full sm:w-auto sm:order-last text-right">
            💾 自動保存: {savedAt.toLocaleTimeString('ja-JP')}
          </div>
        )}
      </div>
    </header>
  );
}

function PropertyList({ projects, properties, masters, onOpen, onAddProperty, onDeleteProperty, onRenameProperty }) {
  // 物件名でグループ化（properties 配列 + projects から集計）
  const propMap = useMemo(() => {
    const g = {};
    // properties から先に登録 (見積0件でも表示)
    (properties || []).forEach(prop => {
      g[prop.name] = { name: prop.name, projects: [], latestUpdate: prop.createdAt, clientName: '', latestTotal: 0, latestEstimate: null };
    });
    // projects から追加
    projects.forEach(p => {
      const key = p.propertyName || '(物件名なし)';
      if (!g[key]) g[key] = { name: key, projects: [], latestUpdate: '', clientName: '' };
      g[key].projects.push(p);
      if (!g[key].latestUpdate || p.updatedAt > g[key].latestUpdate) {
        g[key].latestUpdate = p.updatedAt;
        g[key].clientName = p.clientName || g[key].clientName;
      }
    });
    // 最新見積の総額
    Object.values(g).forEach(prop => {
      if (prop.projects.length > 0) {
        const sorted = [...prop.projects].sort((a, b) => (b.revisionNumber || 1) - (a.revisionNumber || 1));
        const latest = sorted[0];
        prop.latestEstimate = latest;
        prop.latestTotal = computeEstimate(latest, masters).total;
      }
    });
    return Object.values(g).sort((a, b) => (b.latestUpdate || '').localeCompare(a.latestUpdate || ''));
  }, [projects, properties, masters]);

  return (
    <div>
      <div className="flex items-center justify-between mb-6 flex-wrap gap-2">
        <div>
          <h2 className="text-xl sm:text-2xl font-bold text-slate-900">物件一覧</h2>
          <p className="text-sm text-slate-500 mt-1">登録物件: {propMap.length} 件 / 見積: {projects.length} 件</p>
        </div>
        <button onClick={onAddProperty} className="px-4 py-2 text-sm bg-slate-900 text-white rounded-md hover:bg-slate-700">＋ 物件の登録</button>
      </div>
      {propMap.length === 0 ? (
        <div className="bg-white border border-slate-200 rounded-lg p-12 text-center">
          <p className="text-slate-500">物件がまだ登録されていません</p>
          <p className="text-xs text-slate-400 mt-2">右上の「＋ 物件の登録」から始めてください</p>
        </div>
      ) : (
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          {propMap.map(prop => (
            <div key={prop.name} className="border border-slate-200 rounded-lg bg-white overflow-hidden hover:border-slate-400 transition">
              <div onClick={() => onOpen(prop.name)} className="p-4 cursor-pointer">
                <div className="flex items-center justify-between mb-1">
                  <div className="text-xs text-slate-500">{prop.latestUpdate ? `最終更新: ${fmtDate(prop.latestUpdate)}` : '新規物件'}</div>
                  <span className="text-xs bg-amber-50 text-amber-700 px-2 py-0.5 rounded font-semibold">

// ============ 🧪 図面AI自動入力パネル（実験版・別リポ zumen-ai） ============
const ZUMEN_AI_KEY = 'zumen_ai_apikey';
const ZUMEN_VAR_LABEL = { perimeter:'外周長', floor1_area:'1階床面積', floor2_area:'2階床面積', building_area:'建築面積', roof_area:'屋根面積', wall_area:'外壁面積' };

const ZUMEN_VAR_UNIT = { perimeter:'m', floor1_area:'㎡', floor2_area:'㎡', building_area:'㎡', roof_area:'㎡', wall_area:'㎡' };
// 内訳明細の数量を直接埋める対象（項目No＝既存マスタ準拠）。仕上表が無い場合は推定可。
const ZUMEN_LINE = [

function DrawingAIPanel({ project, sp, onChange }) {
  const setScale = (key, val) => onChange(p => ({ ...p, scale: { ...p.scale, [key]: val } }));
  const setManualQty = (no, val) => onChange(p => ({ ...p, manualQuantities: { ...(p.manualQuantities || {}), [no]: val } }));
  const [apiKey, setApiKey] = useState(localStorage.getItem(ZUMEN_AI_KEY) || '');
  const [keyOpen, setKeyOpen] = useState(!localStorage.getItem(ZUMEN_AI_KEY));
  const [files, setFiles] = useState([]);
  const [scaleHint, setScaleHint] = useState('');
  const [threshold, setThreshold] = useState(0.5);
  const [status, setStatus] = useState(null);
  const [busy, setBusy] = useState(false);
  const [result, setResult] = useState(null);
  const fileRef = useRef(null);
  const [drag, setDrag] = useState(false);

  // AIが読んだ1値を入力欄へ反映/解除する（on=採用, off=空欄に戻す＝係数推定に委ねる）
  const applyItem = (it, on) => {
    const val = on ? String(it.value) : '';
    if (it.kind === 'scale') setScale(it.target, val);
    else setManualQty(it.target, val);
  };
  const toggleAdopt = (id) => {
    const cur = result && result.items.find(it => it.id === id);
    if (!cur) return;
    const nextAdopted = !cur.adopted;
    applyItem(cur, nextAdopted);
    setResult(r => ({ ...r, items: r.items.map(it => it.id === id ? { ...it, adopted: nextAdopted } : it) }));
  };

  const saveKey = () => {
    const v = (apiKey || '').trim();
    if (!v) { setStatus({ msg: 'キーを入力してください', err: true }); return; }
    localStorage.setItem(ZUMEN_AI_KEY, v); setKeyOpen(false); setStatus({ msg: 'キーを保存しました ✓', err: false });
  };
  const clearKey = () => { localStorage.removeItem(ZUMEN_AI_KEY); setApiKey(''); setStatus({ msg: 'キーを消去しました', err: false }); };

  const addFiles = (fileList) => {
    const ok = ['image/png', 'image/jpeg', 'application/pdf'];
    Array.from(fileList || []).forEach(f => {
      if (!ok.includes(f.type)) { setStatus({ msg: f.name + ' は対応外（PDF・JPG・PNGのみ）', err: true }); return; }
      const r = new FileReader();
      r.onload = () => setFiles(prev => [...prev, { base64: r.result.split(',')[1], mediaType: f.type, isPdf: f.type === 'application/pdf', name: f.name }]);
      r.readAsDataURL(f);
    });
  };
  const removeFile = (idx) => setFiles(prev => prev.filter((_, i) => i !== idx));

  const buildSchema = () => ({
    type: 'object', additionalProperties: false,
    properties: {
      scale_basis: { type: 'string' },
      values: { type: 'array', items: {
        type: 'object', additionalProperties: false,
        properties: {
          variable: { type: 'string', enum: ['perimeter','floor1_area','floor2_area','building_area','roof_area','wall_area'] },
          value: { type: 'number' }, unit: { type: 'string' },
          source: { type: 'string', enum: ['measured','estimated'] },
          confidence: { type: 'number' }, basis: { type: 'string' }
        }, required: ['variable','value','unit','source','confidence','basis'] } },
      line_quantities: { type: 'array', items: {
        type: 'object', additionalProperties: false,
        properties: {
          item: { type: 'string', enum: ['cloth_area','flooring_area','cf_area','tatami_count','baseboard','cornice','interior_doors','sliding_doors'] },
          value: { type: 'number' }, unit: { type: 'string' },
          source: { type: 'string', enum: ['measured','estimated'] },
          confidence: { type: 'number' }, basis: { type: 'string' }
        }, required: ['item','value','unit','source','confidence','basis'] } }
    }, required: ['scale_basis','values','line_quantities']
  });

  const buildPrompt = () => [
    'あなたは木造在来工法住宅の積算担当者です。添付の図面（平面図・立面図・屋根伏図・パース等／手書き・印刷・写真いずれも可。複数枚あれば総合して判断）から「数量拾い出し」を行い、下記の数量をJSONで返します。',
    '',
    '【最重要原則】',
    '1. 図面ファースト：図面に書かれた寸法線・面積表・室名・帖数・建具記号・勾配記号を、いかなる前提よりも優先する。',
    '2. 絶対に「情報不足で算出できない」で止めない。読めない箇所は910mmグリッドと下記の標準仮定で補い、必ず数値を出す。',
    '3. 図面から実測した値は source="measured"（confidence高め0.7〜0.95）、グリッドや標準仮定からの推定は source="estimated"（confidence低め0.3〜0.6）。',
    '',
    '【標準仮定（図面に記載が無い場合のみ適用）】',
    'モジュール910mm／天井高2400mm／幅木H60／廻り縁あり／在来3寸／軒の出455mm／1帖=1.62㎡。',
    '【開口控除の標準値（建具記号で特定できない場合）】掃出窓3.5㎡・腰窓1.8㎡・小窓0.5㎡／幅木控除：室内ドア1.6m・引戸1.7m。',
    '【建具記号の読み方】例 16524 → W1600×H2400（W=上3桁×10mm、H=下2桁×100mm）。種別表記（引違/掃出/FIX/ドア）と併せて区分。',
    '',
    '【読み取り手順】①面積表があれば正とする ②各階外形(W×D)を910で割付 ③室名と帖数(帖記載=実測,無記載=グリッド推定) ④開口部を全数 ⑤屋根勾配記号 ⑥段違い・下屋・吹抜・UB・土間の有無。',
    '',
    '【縮尺の手がかり】' + (scaleHint.trim() ? scaleHint.trim() : '（指定なし。図面の寸法線・通り芯・面積表から割り出す）'),
    '',
    '【出力する中間変数 values】',
    '・perimeter 外周長(m)：凹凸を反映した建物外周の総延長',
    '・building_area 建築面積(㎡)：1階の床面積',
    '・floor1_area / floor2_area：各階床面積(㎡)',
    '・wall_area 外壁見付面積(㎡)：外周長×平均壁高−開口控除。段違い・下屋は高さ帯ごとに分割して合算。',
    '・roof_area 屋根面積(㎡)：屋根投影面積×勾配補正(3寸×1.05,3.5寸×1.06,4寸×1.08,5寸×1.12)。下屋は別途加算。',
    '',
    '【出力する内訳明細の数量 line_quantities（仕上表が無くても標準仮定で必ず全8項目を概算する）】',
    '・cloth_area クロス総量(㎡)＝壁クロス[室別:周長×天井高−開口控除]＋天井クロス[室別:床面積]。UB(ユニットバス)は除外。',
    '・flooring_area フローリング(㎡)：板張り仕上げの室の床面積合計',
    '・cf_area クッションフロア(㎡)：洗面・トイレ等の水回り床',
    '・tatami_count 畳(帖)：和室があれば帖数（無ければ0でなく省略可）',
    '・baseboard 幅木(m)：室別[周長−建具開口幅]の合計。UB除外。',
    '・cornice 廻り縁(m)：室別周長の合計。勾配天井・省略部は控除。',
    '・interior_doors 室内ドア(枚)：開き戸の枚数',
    '・sliding_doors 引戸(枚)：引戸・折戸の枚数',
    '',
    '【記入ルール】',
    '・各値の basis に「①図面からの読取寸法 → ②計算式 → ③結果」を簡潔に書く（例：LDK壁=周長22.0m×2.4m−開口5.0=47.8㎡）。',
    '・数量は小数第1位まで。1帖=1.62㎡。',
    '・line_quantities は上記のうち該当する項目を、読めなくても標準仮定で必ず概算して estimated で返す（空にしない）。',
    '・scale_basis に、縮尺・外形をどう確定したかを書く。'
  ].join('\n');

  const analyze = async () => {
    if (!apiKey) { setStatus({ msg: 'まず🔑APIキーを設定してください', err: true }); setKeyOpen(true); return; }
    if (!files.length) { setStatus({ msg: '図面をアップロードしてください', err: true }); return; }
    setBusy(true); setResult(null); setStatus({ msg: 'AIが図面を積算中…（図面の枚数により30秒〜2分かかることがあります）', err: false });
    const blocks = files.map(f => f.isPdf
      ? { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: f.base64 } }
      : { type: 'image', source: { type: 'base64', media_type: f.mediaType, data: f.base64 } });
    const body = {
      model: 'claude-opus-4-8', max_tokens: 8000,
      messages: [{ role: 'user', content: [...blocks, { type: 'text', text: buildPrompt() }] }],
      output_config: { format: { type: 'json_schema', schema: buildSchema() } }
    };
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify(body)
      });
      if (!res.ok) {
        const t = await res.text(); let msg = 'エラー ' + res.status;
        try { const j = JSON.parse(t); if (j.error && j.error.message) msg += '：' + j.error.message; } catch (e) {}
        if (res.status === 401) msg = 'APIキーが正しくないようです（401）。🔑キーを確認してください。';
        setStatus({ msg: '⚠️ ' + msg, err: true }); return;
      }
      const data = await res.json();
      const tb = (data.content || []).find(b => b.type === 'text');
      if (!tb) { setStatus({ msg: '⚠️ 応答を解釈できませんでした', err: true }); return; }
      const parsed = JSON.parse(tb.text);
      const items = [];
      let idc = 0;
      (parsed.values || []).forEach(v => {
        const field = ZUMEN_VAR_FIELD[v.variable];
        if (!field || !isFinite(v.value) || v.value <= 0) return;
        items.push({ id: 'v' + (idc++), kind: 'scale', target: field, label: ZUMEN_VAR_LABEL[v.variable] || v.variable, value: v.value, unit: v.unit || ZUMEN_VAR_UNIT[v.variable] || '', source: v.source, confidence: v.confidence || 0, basis: v.basis || '', adopted: (v.confidence || 0) >= threshold });
      });
      (parsed.line_quantities || []).forEach(q => {
        const def = ZUMEN_LINE_BY_KEY[q.item];
        if (!def || !isFinite(q.value) || q.value <= 0) return;
        items.push({ id: 'l' + (idc++), kind: 'line', target: def.no, no: def.no, label: def.label, value: q.value, unit: q.unit || def.unit, source: q.source, confidence: q.confidence || 0, basis: q.basis || '', adopted: (q.confidence || 0) >= threshold });
      });
      items.forEach(it => { if (it.adopted) applyItem(it, true); });
      setResult({ items, scaleBasis: parsed.scale_basis || '' });
      const adoptedCount = items.filter(it => it.adopted).length;
      setStatus({ msg: items.length ? ('AIが ' + items.length + ' 件を読み取りました（うち ' + adoptedCount + ' 件を自動入力）。下のリストでチェックを足すと採用できます') : 'AIは数値を読み取れませんでした。縮尺の手がかり（既知寸法）を入れて再試行してください。', err: !items.length });
    } catch (err) {
      setStatus({ msg: '⚠️ 通信に失敗しました：' + err.message, err: true });
    } finally { setBusy(false); }
  };

  return (
    <div className="mb-4 bg-amber-50 border-2 border-amber-300 rounded-lg overflow-hidden">
      <div className="px-4 py-3 bg-amber-100 flex items-center gap-2">
        <span className="font-bold text-amber-900">🧪 図面AIで積算（実験機能）</span>
        <span className="text-xs text-amber-700">平面図・立面図などを放り込むと、外周長・外壁・クロス・幅木などをAIが拾い、入力欄へ反映します</span>
      </div>
      <div className="p-4 space-y-3">
        {/* APIキー */}
        <div className="bg-white border border-amber-200 rounded p-3">
          <button type="button" onClick={() => setKeyOpen(o => !o)} className="text-sm font-bold text-slate-700">{keyOpen ? '▼' : '▶'} 🔑 Claude APIキー（最初に1回だけ）{!keyOpen && localStorage.getItem(ZUMEN_AI_KEY) ? '（保存済み✓）' : ''}</button>
          {keyOpen && (
            <div className="mt-2 space-y-2">
              <p className="text-xs text-slate-500">キーはこの端末のブラウザ内だけに保存され、外部サーバーには送りません（送信先はClaude公式APIのみ）。</p>
              <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="sk-ant-..." autoComplete="off" className="w-full border-2 border-slate-300 rounded px-3 py-2 text-sm" />
              <div className="flex items-center gap-3">
                <button type="button" onClick={saveKey} className="bg-slate-800 text-white font-bold px-4 py-2 rounded text-sm">🔒 キーを保存</button>
                <button type="button" onClick={clearKey} className="text-red-700 underline text-sm">消去</button>
              </div>
            </div>
          )}
        </div>
        {/* アップロード（複数可：平面図＋立面図＋パース等をまとめて入れると精度UP） */}
        <div onClick={() => fileRef.current && fileRef.current.click()}
          onDragOver={e => { e.preventDefault(); setDrag(true); }} onDragLeave={() => setDrag(false)}
          onDrop={e => { e.preventDefault(); setDrag(false); addFiles(e.dataTransfer.files); }}
          className={'border-2 border-dashed rounded-lg p-4 text-center cursor-pointer ' + (drag ? 'border-amber-500 bg-amber-100' : 'border-amber-300 bg-white')}>
          <div className="text-3xl">📐</div>
          <div className="font-bold text-sm">図面をドラッグ＆ドロップ／タップして選択（複数まとめて可）</div>
          <div className="text-xs text-slate-500">平面図＋立面図＋パースを一緒に入れるほど精度が上がります（PDF / JPG / PNG）</div>
          <input ref={fileRef} type="file" accept="image/png,image/jpeg,application/pdf" multiple className="hidden" onChange={e => { addFiles(e.target.files); e.target.value = ''; }} />
        </div>
        {files.length > 0 && (
          <div className="flex flex-wrap gap-2">
            {files.map((f, i) => (
              <div key={i} className="flex items-center gap-2 bg-white border border-amber-200 rounded px-2 py-1">
                {f.isPdf ? <span className="text-lg">📄</span> : <img src={'data:' + f.mediaType + ';base64,' + f.base64} alt="" className="h-10 w-10 object-cover rounded" />}
                <span className="text-xs text-slate-600 max-w-[140px] truncate">{f.name}</span>
                <button type="button" onClick={e => { e.stopPropagation(); removeFile(i); }} className="text-red-700 font-bold text-sm px-1">✕</button>
              </div>
            ))}
          </div>
        )}
        {/* 縮尺の手がかり */}
        <label className="block text-sm font-bold">縮尺の手がかり（任意・精度の生命線）
          <input value={scaleHint} onChange={e => setScaleHint(e.target.value)} placeholder="例：南面通り芯7280mm／面積表に延床104㎡／1マス910mm" className="w-full border-2 border-slate-300 rounded px-2 py-2 mt-1 font-normal" />
        </label>
        {/* 解析ボタン */}
        <button type="button" onClick={analyze} disabled={busy}
          className={'w-full text-white font-bold py-3 rounded-lg ' + (busy ? 'bg-slate-400' : 'bg-[#C85400] hover:bg-[#A84500]')}>
          {busy ? '積算中…（少々お待ちください）' : '🔍 図面をAIで積算して入力欄に反映'}
        </button>
        {status && <p className={'text-sm font-bold ' + (status.err ? 'text-red-700' : 'text-green-700')}>{status.msg}</p>}
        <p className="text-xs text-slate-400">💡 1回の解析でClaude APIの少額料金がかかります（主に図面の枚数・サイズで変動）。必要な図面だけ入れると安く済みます。</p>
        {/* 反映結果：AIが読んだ値を全部表示。チェックで採用／外すと係数推定に戻る */}
        {result && (
          <div className="bg-white border border-amber-200 rounded p-3">
            {result.scaleBasis && <div className="text-xs text-slate-500 mb-2">縮尺の判断：{result.scaleBasis}</div>}
            {result.items.length === 0 ? (
              <p className="text-sm text-slate-600">数値を読み取れませんでした。縮尺の手がかり（既知寸法）を入れて、もう一度お試しください。</p>
            ) : (
              <div>
                <div className="text-sm font-bold text-slate-700 mb-2">AIが読み取った値（✓を付けると採用＝入力欄へ反映／外すと係数推定に戻ります）</div>
                <div className="space-y-1">
                  {result.items.map(it => (
                    <label key={it.id} className={'flex items-start gap-2 text-sm border-b border-slate-100 py-2 cursor-pointer ' + (it.adopted ? '' : 'opacity-60')}>
                      <input type="checkbox" checked={it.adopted} onChange={() => toggleAdopt(it.id)} className="mt-1 w-5 h-5 shrink-0" />
                      <span className="flex-1 min-w-0">
                        <span className="font-bold">
                          <span className={'text-xs px-1.5 py-0.5 rounded mr-1 ' + (it.kind === 'line' ? 'bg-amber-100 text-amber-800' : 'bg-blue-100 text-blue-800')}>{it.kind === 'line' ? ('明細' + (it.no ? ' ' + it.no : '')) : '規模'}</span>
                          {it.label}
                          <span className={'text-xs ml-2 px-1.5 py-0.5 rounded text-white ' + (it.source === 'measured' ? 'bg-blue-600' : 'bg-slate-400')}>{it.source === 'measured' ? '実測' : '推定'}</span>
                          <span className="text-xs text-slate-500 ml-2">信頼度{Math.round(it.confidence * 100)}%</span>
                        </span>
                        <span className="block num font-bold">{it.value.toLocaleString('ja-JP', { maximumFractionDigits: 2 })} {it.unit}</span>
                        {it.basis && <span className="block text-xs text-slate-500">{it.basis}</span>}
                      </span>
                    </label>
                  ))}
                </div>
                <p className="text-xs text-slate-500 mt-2">✓の値が「規模」入力欄・「2.内訳明細」の数量に反映され、見積が再計算されます。<span className="font-bold">推定</span>は仕上表が無いための概算です（信頼度が低めでも、確認のうえ採用できます）。各欄で手直しもできます。</p>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function TabScale({ project, onChange, result }) {
  const sp = result.scale;
  const setScale = (key, val) => onChange(p => ({ ...p, scale: { ...p.scale, [key]: val } }));
  const opts = project.options || [];
  const setOptions = (newOpts) => onChange(p => ({ ...p, options: newOpts }));

  // 階数を変更したとき、軒高のデフォルトも更新
  const setFloorCount = (val) => {
    const newFloor = parseInt(val);
    const defaultEaves = { 1: 3.5, 2: 6.5, 3: 9.5 }[newFloor] || 6.5;
    onChange(p => ({ ...p, scale: { ...p.scale, floorCount: newFloor, eavesHeight: defaultEaves } }));
  };

  const [advancedOpen, setAdvancedOpen] = useState(false);
  const floorCount = parseInt(project.scale.floorCount) || 2;
  const defaultFloorArea = (sp.totalFloorArea / floorCount).toFixed(2);

  return (
    <div>
      <DrawingAIPanel project={project} sp={sp} onChange={onChange} />
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
        <div className="bg-white border border-slate-200 rounded-lg p-4 sm:p-5">
          <h4 className="text-sm font-bold text-slate-900 mb-4">📝 入力欄</h4>
          <div className="space-y-4">
            <Field label="延床坪数" value={project.scale.tsuboFloor} unit="坪"
              conversion={`= ${(parseFloat(project.scale.tsuboFloor || 0) * 3.3058).toFixed(2)} ㎡`}
              onChange={v => setScale('tsuboFloor', parseFloat(v) || 0)} />
            <SelectField label="階数" value={project.scale.floorCount}
              options={[{v:1,l:'1階(平屋)'},{v:2,l:'2階'},{v:3,l:'3階'}]}
              onChange={v => setFloorCount(v)}
              help="変更すると軒高のデフォルト値も更新されます" />

            <Field label="建築面積" value={project.scale.buildingAreaInput} unit="㎡" step="0.1"
              conversion={project.scale.buildingAreaInput ? `= ${(parseFloat(project.scale.buildingAreaInput) / 3.3058).toFixed(2)} 坪` : ''}
              onChange={v => setScale('buildingAreaInput', v)}
              help={`1階の床面積(建物を真上から見た面積)。基礎・屋根の計算に使用。\n空欄なら自動(現在: ${sp.buildingArea.toFixed(2)}㎡)`} />

            {/* 1階・2階面積を主要入力欄に (平屋では不要) */}
            {floorCount >= 2 && (
              <div className="bg-slate-50 border border-slate-200 rounded p-3 space-y-2">
                <div className="text-xs font-bold text-slate-700">階別面積（任意・詳細入力）</div>
                <Field label="1階面積" value={project.scale.floor1Area} unit="㎡" step="0.1"
                  conversion={project.scale.floor1Area ? `= ${(parseFloat(project.scale.floor1Area) / 3.3058).toFixed(2)} 坪` : ''}
                  onChange={v => setScale('floor1Area', v)} help={`空欄なら自動(${defaultFloorArea}㎡)`} />
                <Field label="2階面積" value={project.scale.floor2Area} unit="㎡" step="0.1"
                  conversion={project.scale.floor2Area ? `= ${(parseFloat(project.scale.floor2Area) / 3.3058).toFixed(2)} 坪` : ''}
                  onChange={v => setScale('floor2Area', v)} help={`空欄なら自動(${defaultFloorArea}㎡)`} />
                {floorCount >= 3 && (
                  <Field label="3階面積" value={project.scale.floor3Area} unit="㎡" step="0.1"
                    conversion={project.scale.floor3Area ? `= ${(parseFloat(project.scale.floor3Area) / 3.3058).toFixed(2)} 坪` : ''}
                    onChange={v => setScale('floor3Area', v)} help={`空欄なら自動(${defaultFloorArea}㎡)`} />
                )}
              </div>
            )}

            <Field label="軒高" value={project.scale.eavesHeight} unit="m" step="0.1"
              onChange={v => setScale('eavesHeight', parseFloat(v) || 0)}
              help={`平屋3.5m / 2階6.5m / 3階9.5m が目安。最高高さではなく軒高です。`} />
            <SelectField label="屋根形状" value={project.scale.roofShape}
              options={[{v:'切妻',l:'切妻 (1.32)'},{v:'寄棟',l:'寄棟 (1.40)'},{v:'片流れ',l:'片流れ (1.20)'},{v:'陸屋根',l:'陸屋根 (1.05)'}]}
              onChange={v => setScale('roofShape', v)} help="数字は屋根面積係数(建築面積×係数)" />
            <SelectField label="建物の形" value={project.scale.buildingShape || '長方形'}
              options={[
                {v:'正方形',l:'正方形 (シンプル、係数1.00)'},
                {v:'長方形',l:'長方形 (一般的、係数0.89)'},
                {v:'L字型',l:'L字型 (やや複雑、係数0.82)'},
                {v:'コの字型',l:'コの字型 (複雑、係数0.76)'}
              ]}
              onChange={v => setScale('buildingShape', v)}
              help="複雑な形ほど、外周長が増えて足場・外壁が高くなります" />
          </div>
        </div>
        <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 sm:p-5">
          <h4 className="text-sm font-bold text-slate-900 mb-4 flex items-center gap-2">
            <span>🔄 自動算出</span>
            <span className="text-xs text-blue-600">リアルタイム</span>
          </h4>
          <div className="space-y-2 text-sm">
            <Row label="建築面積" value={`${sp.buildingArea.toFixed(2)} ㎡`} bold highlight={sp.buildingAreaManual} />
            <Row label="外周長" value={`${sp.perimeter.toFixed(2)} m`} bold highlight={sp.perimeterManual} />
            <Row label="外壁高さ" value={`${sp.wallHeight.toFixed(1)} m`} bold help="軒高+2.0m" />
            <div className="border-t border-blue-300 my-3"></div>
            <div className="text-xs text-slate-500 mb-2">📐 派生値（参考）</div>
            <Row label="延床面積" value={`${sp.totalFloorArea.toFixed(2)} ㎡`} />
            <Row label="外壁面積" value={`${sp.wallArea.toFixed(2)} ㎡`} highlight={sp.wallAreaManual} />
            <Row label="屋根面積" value={`${sp.roofArea.toFixed(2)} ㎡`} highlight={sp.roofAreaManual} />
            <Row label="内装床面積" value={`${sp.innerFloorArea.toFixed(2)} ㎡`} />
          </div>
        </div>
      </div>

      {/* 詳細寸法（派生値の手動上書きのみ） */}
      <div className="mt-4 bg-white border border-slate-200 rounded-lg overflow-hidden">
        <button onClick={() => setAdvancedOpen(o => !o)}
          className="w-full px-4 py-3 flex items-center justify-between hover:bg-slate-50 text-left">
          <span className="font-bold text-sm">
            {advancedOpen ? '▼' : '▶'} 派生値を直接上書き（実測値で精度UP）
          </span>
          <span className="text-xs text-slate-500">空欄なら自動計算</span>
        </button>
        {advancedOpen && (
          <div className="p-4 border-t border-slate-200 bg-slate-50">
            <p className="text-xs text-slate-600 mb-3">図面から実測した値を入れると、自動計算より高い精度になります。手動値が入った項目は <span className="bg-amber-100 px-1 rounded font-bold">マーカー表示</span> されます。</p>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
              <Field label="外周長" value={project.scale.manualPerimeter} unit="m" step="0.1"
                onChange={v => setScale('manualPerimeter', v)} help={`空欄なら自動(${sp.autoPerimeter.toFixed(2)}m)`} />
              <Field label="外壁面積" value={project.scale.manualWallArea} unit="㎡" step="0.1"
                onChange={v => setScale('manualWallArea', v)} help={`空欄なら自動(${sp.autoWallArea.toFixed(2)}㎡)`} />
              <Field label="屋根面積" value={project.scale.manualRoofArea} unit="㎡" step="0.1"
                onChange={v => setScale('manualRoofArea', v)} help={`空欄なら自動(${sp.autoRoofArea.toFixed(2)}㎡)`} />
            </div>
          </div>
        )}
      </div>

      <div className="mt-4 bg-amber-50 border-l-4 border-amber-400 p-3 text-xs text-amber-900 rounded">
        💡 軒高が一定でない場合（部分的に高さが違う等）は、平均的な値を入れてください。大きく違う場合は内訳明細タブで該当項目（足場・外壁・断熱壁）の数量を直接編集できます。
      </div>

      {/* オプション工事セクション */}
      <div className="mt-6 bg-orange-50 border border-orange-200 rounded-lg p-4 sm:p-5">
        <div className="flex items-center justify-between mb-3">
          <h4 className="text-sm font-bold text-slate-900">🔧 オプション工事</h4>
          <button onClick={() => setOptions([...opts, { id: uuid(), name: '', amount: 0 }])}
            className="text-xs px-3 py-1 border border-orange-400 text-orange-700 rounded hover:bg-orange-100">＋ 追加</button>
        </div>
        <p className="text-xs text-slate-600 mb-3">太陽光・解体・追加外構など、見積ごとに金額が変わるもの</p>
        <OptionPresets options={opts} setOptions={setOptions} />
        {opts.length > 0 && (
          <div className="space-y-2 mt-3">
            {opts.map((o, i) => (
              <div key={o.id || i} className="bg-white rounded p-2 flex items-center gap-2">
                <input type="text" value={o.name} onChange={e => {
                  const newOpts = [...opts]; newOpts[i] = { ...o, name: e.target.value }; setOptions(newOpts);
                }} className="flex-1 border border-slate-300 bg-slate-50 hover:bg-white focus:bg-white focus:border-blue-500 focus:outline-none rounded px-2 py-1 text-sm" placeholder="工事名" />
                <input type="number" value={o.amount} onChange={e => {
                  const newOpts = [...opts]; newOpts[i] = { ...o, amount: parseFloat(e.target.value) || 0 }; setOptions(newOpts);
                }} className="border border-slate-300 bg-slate-50 hover:bg-white focus:bg-white focus:border-blue-500 focus:outline-none rounded px-2 py-1 text-sm w-32 text-right num font-mono" />
                <span className="text-xs text-slate-500">円</span>
                <button onClick={() => setOptions(opts.filter((_, j) => j !== i))}
                  className="text-xs text-red-600 px-2 hover:bg-red-50 rounded">削除</button>
              </div>
            ))}
            <div className="text-right text-sm font-semibold text-orange-700 mt-2">
              小計: <span className="num">{fmt(opts.reduce((s, o) => s + (parseFloat(o.amount) || 0), 0))}</span> 円
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function OptionPresets({ options, setOptions }) {
  const presets = [
    { name: '太陽光発電 4kW', amount: 1200000 },
    { name: '太陽光発電 6kW以上', amount: 1800000 },
    { name: '解体工事 木造30坪', amount: 1200000 },
    { name: '追加外構（10%枠目安）', amount: 280000 }
  ];
  const addPreset = (p) => setOptions([...options, { id: uuid(), name: p.name, amount: p.amount }]);
  return (
    <div className="flex flex-wrap gap-1.5">
      {presets.map(p => (
        <button key={p.name} onClick={() => addPreset(p)}
          className="text-xs px-2 py-1 bg-white border border-orange-300 text-orange-700 rounded hover:bg-orange-50">
          ＋ {p.name} ({(p.amount/10000).toFixed(0)}万)
        </button>
      ))}
    </div>
  );
}

function Field({ label, value, unit, step, onChange, help, conversion }) {
  return (
    <div>
      <label className="text-xs text-slate-600 font-semibold">{label}</label>
      <div className="flex items-center gap-2 mt-1">
        <input type="number" value={value} step={step || 1} onChange={e => onChange(e.target.value)}
          className="border border-slate-300 bg-slate-50 hover:bg-white focus:bg-white focus:border-blue-500 focus:outline-none rounded px-3 py-2 w-28 text-right num font-mono" />
        {unit && <span className="text-sm text-slate-600">{unit}</span>}
        {conversion && <span className="text-xs text-slate-500 num">({conversion})</span>}
      </div>
      {help && <div className="text-xs text-slate-400 mt-1 whitespace-pre-line">{help}</div>}
    </div>
  );
}

function SelectField({ label, value, options, onChange, help }) {
  return (
    <div>
      <label className="text-xs text-slate-600 font-semibold">{label}</label>
      <select value={value} onChange={e => onChange(e.target.value)}
        className="block mt-1 border border-slate-300 bg-slate-50 hover:bg-white focus:bg-white focus:border-blue-500 focus:outline-none rounded px-3 py-2 w-full">
        {options.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
      </select>
      {help && <div className="text-xs text-slate-400 mt-1">{help}</div>}
    </div>
  );
}

function Row({ label, value, bold, highlight, help }) {
  return (
    <div className="flex justify-between items-center">
      <span className="text-slate-600 flex items-center gap-1">
        {label}
        {help && <span className="text-xs text-slate-400" title={help}>ⓘ</span>}
      </span>
      <span className={`num font-mono ${bold ? 'font-semibold text-slate-900' : ''} ${highlight ? 'bg-amber-100 px-2 py-0.5 rounded font-bold' : ''}`}>{value}</span>
    </div>
  );
}

function TabDetails({ project, onChange, result }) {
  const [filter, setFilter] = useState({ category: 'all', group: 'all' });
  const [collapsed, setCollapsed] = useState({});

  const filtered = result.lines.filter(l => {
    if (l.masterDisabled) return false;  // マスタで無効化された項目は表示しない
    if (filter.category !== 'all' && l.category !== filter.category) return false;
    if (filter.group !== 'all' && l.categoryGroup !== filter.group) return false;
    return true;
  });

  // カテゴリ別グループ化（A, B, C, ... の項目記号ごと）
  // 注: 全項目がmasterDisabledのカテゴリは表示されない
  // 区分(本体/付帯/諸経費)ごとに並べ、新規追加カテゴリは該当区分の末尾に配置
  const groups = useMemo(() => {
    const g = {};
    filtered.forEach(l => {
      const key = l.categoryGroup;
      if (!g[key]) g[key] = { categoryGroup: key, categoryName: l.categoryName, category: l.category, lines: [], total: 0 };
      g[key].lines.push(l);
      g[key].total += l.amount;
    });
    return sortGroupsBySection(Object.values(g));
  }, [filtered]);

  const toggleItem = (no) => {
    onChange(p => {
      const ex = p.excludedItems || [];
      const newEx = ex.includes(no) ? ex.filter(x => x !== no) : [...ex, no];
      return { ...p, excludedItems: newEx };
    });
  };
  const editPrice = (no, val) => {
    onChange(p => {
      const mp = { ...(p.manualPrices || {}) };
      if (val === '' || val === null) delete mp[no];
      else mp[no] = parseFloat(val) || 0;
      return { ...p, manualPrices: mp };
    });
  };
  const resetManual = (no) => {
    onChange(p => {
      const mp = { ...(p.manualPrices || {}) }; delete mp[no];
      return { ...p, manualPrices: mp };
    });
  };
  const editQuantity = (no, val) => {
    onChange(p => {
      const mq = { ...(p.manualQuantities || {}) };
      if (val === '' || val === null) delete mq[no];
      else mq[no] = parseFloat(val) || 0;
      return { ...p, manualQuantities: mq };
    });
  };
  const resetQuantity = (no) => {
    onChange(p => {
      const mq = { ...(p.manualQuantities || {}) }; delete mq[no];
      return { ...p, manualQuantities: mq };
    });
  };
  // この見積限定で、内訳名・規格を編集 (スナップショットを書き換え)
  const editSnapshotField = (no, key, val) => {
    onChange(p => {
      const snapshot = p.rateMasterSnapshot || [];
      const newSnapshot = snapshot.map(item =>
        item.no === no ? { ...item, [key]: val } : item
      );
      return { ...p, rateMasterSnapshot: newSnapshot };
    });
  };
  const addCustom = (categoryGroup) => {
    const groupInfo = result.lines.find(l => l.categoryGroup === categoryGroup);
    // 同カテゴリ内の最大番号を探して+1
    const existing = result.lines.filter(l => l.categoryGroup === categoryGroup);
    let maxNum = 0;
    existing.forEach(l => {
      const m = String(l.no).match(/-(\d+)$/);
      if (m) {
        const n = parseInt(m[1], 10);
        if (n > maxNum) maxNum = n;
      }
    });
    const newNo = `${categoryGroup}-${maxNum + 1}`;
    const c = {
      id: uuid(), no: newNo,
      name: '新しいカスタム項目', spec: '', quantity: 1, unit: '式', price: 0,
      category: groupInfo?.category || '本体工事',
      categoryGroup: categoryGroup || 'M',
      categoryName: groupInfo?.categoryName || 'カスタム',
      enabled: true
    };
    onChange(p => ({ ...p, customItems: [...(p.customItems || []), c] }));
  };

  // この見積限定で、新しいカテゴリーを追加 (customItems経由・他見積には影響しない) — モーダルで入力
  const [addCatModalOpen, setAddCatModalOpen] = useState(false);
  const addCustomCategoryNextCode = useMemo(() => {
    const used = new Set();
    result.lines.forEach(l => used.add(l.categoryGroup));
    return nextAvailableCategoryCode([...used]);
  }, [result.lines]);
  const addCustomCategoryExistingNames = useMemo(
    () => [...new Set(result.lines.map(l => l.categoryName))],
    [result.lines]
  );
  const handleAddCustomCategoryConfirm = (trimmed, category) => {
    if (!trimmed) return;
    const used = new Set();
    result.lines.forEach(l => used.add(l.categoryGroup));
    const code = nextAvailableCategoryCode([...used]);
    const c = {
      id: uuid(),
      no: `${code}-1`,
      name: '新規項目',
      spec: '',
      quantity: 1,
      unit: '式',
      price: 0,
      category,
      categoryGroup: code,
      categoryName: trimmed,
      enabled: true
    };
    onChange(p => ({ ...p, customItems: [...(p.customItems || []), c] }));
    // この見積のフィルタが絞り込み中の場合、新カテゴリが見えなくなるのを防ぐためにリセット
    setFilter({ category: 'all', group: 'all' });
    setAddCatModalOpen(false);
  };
  const updateCustom = (id, key, val) => {
    onChange(p => ({ ...p, customItems: (p.customItems || []).map(c => c.id === id ? { ...c, [key]: val } : c) }));
  };
  const deleteCustom = (id) => {
    onChange(p => ({ ...p, customItems: (p.customItems || []).filter(c => c.id !== id) }));
  };
  const toggleCollapse = (g) => setCollapsed(c => ({ ...c, [g]: !c[g] }));

  // フィルタ用の項目コード一覧を現データから動的に作成 (ユーザー追加カテゴリも含む)
  const groupCodes = useMemo(() => {
    const set = new Set();
    result.lines.forEach(l => {
      if (l.masterDisabled) return; // マスタで無効化されているものは選択肢に出さない
      set.add(l.categoryGroup);
    });
    return [...set].sort(compareCategoryCode);
  }, [result.lines]);

  // 共通のセルスタイル
  const editableCell = "border border-slate-300 bg-slate-50 hover:bg-white focus:bg-white focus:border-blue-500 focus:outline-none rounded px-1.5 py-0.5";
  const editableCellNum = editableCell + " text-right num font-mono";

  return (
    <div>
      {/* フィルタ */}
      <div className="bg-white rounded-lg p-3 mb-3 flex gap-2 items-center text-sm flex-wrap border border-slate-200">
        <span className="text-slate-600 text-xs">カテゴリ:</span>
        <select value={filter.category} onChange={e => setFilter(f => ({...f, category: e.target.value}))}
          className="border border-slate-300 rounded px-2 py-1 text-xs bg-slate-50">
          <option value="all">すべて</option>
          <option value="本体工事">本体工事</option>
          <option value="付帯工事">付帯工事</option>
          <option value="諸経費">諸経費</option>
        </select>
        <span className="text-slate-600 text-xs ml-2">項目:</span>
        <select value={filter.group} onChange={e => setFilter(f => ({...f, group: e.target.value}))}
          className="border border-slate-300 rounded px-2 py-1 text-xs bg-slate-50">
          <option value="all">すべて</option>
          {groupCodes.map(g => <option key={g} value={g}>{g}</option>)}
        </select>
        <button onClick={() => setAddCatModalOpen(true)}
          className="ml-2 text-xs px-2 py-1 border border-pink-400 text-pink-700 bg-pink-50 rounded hover:bg-pink-100 font-bold"
          title="この見積限定のカテゴリーを追加(英字コードは自動採番)">＋ 新規カテゴリ追加</button>
        <span className="ml-auto text-xs text-slate-500">{filtered.length} 件表示</span>
      </div>
      <CategoryAddModal open={addCatModalOpen}
        title="新規カテゴリー追加"
        scope="この見積限定（他の見積には影響しません）"
        existingNames={addCustomCategoryExistingNames}
        nextCode={addCustomCategoryNextCode}
        onCancel={() => setAddCatModalOpen(false)}
        onConfirm={handleAddCustomCategoryConfirm} />

      {/* カテゴリ別グループ */}
      <div className="space-y-3">
        {groups.map(g => {
          const isCollapsed = collapsed[g.categoryGroup];
          const catColor = g.category === '本体工事' ? 'bg-blue-100 text-blue-900 border-blue-300' :
                           g.category === '付帯工事' ? 'bg-amber-100 text-amber-900 border-amber-300' :
                           'bg-green-100 text-green-900 border-green-300';
          return (
            <div key={g.categoryGroup} className="bg-white border border-slate-200 rounded-lg overflow-hidden">
              {/* グループヘッダー */}
              <div className={`${catColor} px-3 py-2 border-b flex items-center justify-between`}>
                <div className="flex items-center gap-2">
                  <button onClick={() => toggleCollapse(g.categoryGroup)} className="text-xs hover:bg-white/30 rounded px-1">
                    {isCollapsed ? '▶' : '▼'}
                  </button>
                  <span className="font-mono font-bold text-sm">{g.categoryGroup}.</span>
                  <span className="font-bold text-sm">{g.categoryName}</span>
                  <span className="text-xs ml-2">({g.lines.length}件)</span>
                </div>
                <div className="flex items-center gap-3">
                  <button onClick={() => addCustom(g.categoryGroup)}
                    className="text-xs px-2 py-0.5 border border-current rounded hover:bg-white/30">＋追加</button>
                  <span className="num font-mono font-bold text-sm">{fmt(g.total)} 円</span>
                </div>
              </div>

              {/* テーブル */}
              {!isCollapsed && (
                <div className="overflow-x-auto">
                  <table className="w-full text-xs" style={{tableLayout: 'fixed'}}>
                    <colgroup>
                      <col style={{width:'32px'}} />
                      <col style={{width:'56px'}} />
                      <col style={{width:'180px'}} />
                      <col />
                      <col style={{width:'80px'}} />
                      <col style={{width:'56px'}} />
                      <col style={{width:'128px'}} />
                      <col style={{width:'112px'}} />
                      <col style={{width:'128px'}} />
                      <col style={{width:'32px'}} />
                    </colgroup>
                    <thead className="bg-slate-100 text-slate-600">
                      <tr>
                        <th className="px-2 py-1.5 text-center">使</th>
                        <th className="px-2 py-1.5 text-left">No.</th>
                        <th className="px-2 py-1.5 text-left">内訳名</th>
                        <th className="px-2 py-1.5 text-left">規格・仕様</th>
                        <th className="px-2 py-1.5 text-right">数量</th>
                        <th className="px-2 py-1.5 text-left">単位</th>
                        <th className="px-2 py-1.5 text-right">単価</th>
                        <th className="px-2 py-1.5 text-right">金額</th>
                        <th className="px-2 py-1.5 text-left">数量式</th>
                        <th className="px-2 py-1.5"></th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {g.lines.map(l => {
                        const isCustom = l.isCustom;
                        const manualVal = (project.manualPrices || {})[l.no];
                        const priceColor = l.priceSource === 'manual' ? 'text-blue-700 font-bold' :
                                           l.priceSource === 'custom' ? 'text-pink-700' : 'text-slate-900';
                        return (
                          <tr key={isCustom ? l.customId : l.no} className={!l.enabled ? 'opacity-40' : ''}>
                            <td className="px-2 py-1.5 text-center">
                              {isCustom ? (
                                <input type="checkbox" checked={l.enabled} onChange={e => updateCustom(l.customId, 'enabled', e.target.checked)} />
                              ) : (
                                <input type="checkbox" checked={l.enabled} onChange={() => toggleItem(l.no)} />
                              )}
                            </td>
                            <td className="px-2 py-1.5 font-mono">
                              {isCustom ? <span className="text-pink-600">{l.displayNo || l.no}</span> : (l.displayNo || l.no)}
                            </td>
                            <td className="px-2 py-1.5">
                              {isCustom ? (
                                <input type="text" value={l.name || ''}
                                  onChange={e => updateCustom(l.customId, 'name', e.target.value)}
                                  className={editableCell + " w-full bg-pink-50"} />
                              ) : (
                                <input type="text" value={l.name || ''}
                                  onChange={e => editSnapshotField(l.no, 'name', e.target.value)}
                                  className={editableCell + " w-full"} />
                              )}
                            </td>
                            <td className="px-2 py-1.5 text-slate-500">
                              {isCustom ? (
                                <input type="text" value={l.spec || ''}
                                  onChange={e => updateCustom(l.customId, 'spec', e.target.value)}
                                  className={editableCell + " w-full bg-pink-50"} />
                              ) : (
                                <input type="text" value={l.spec || ''}
                                  onChange={e => editSnapshotField(l.no, 'spec', e.target.value)}
                                  className={editableCell + " w-full"} />
                              )}
                            </td>
                            <td className="px-2 py-1.5 text-right">
                              {isCustom ? (
                                <input type="number" value={l.quantity}
                                  onChange={e => updateCustom(l.customId, 'quantity', e.target.value)}
                                  className={editableCellNum + " w-20 bg-pink-50"} />
                              ) : (
                                <div className="flex items-center gap-1 justify-end">
                                  <input type="number" step="0.01"
                                    value={(project.manualQuantities || {})[l.no] !== undefined ? project.manualQuantities[l.no] : l.autoQuantity.toFixed(2)}
                                    onChange={e => editQuantity(l.no, e.target.value)}
                                    className={editableCellNum + " w-20 " + (l.quantitySource === 'manual' ? 'text-blue-700 font-bold' : '')} />
                                  {l.quantitySource === 'manual' && (
                                    <button onClick={() => resetQuantity(l.no)}
                                      className="text-xs text-blue-600 hover:bg-blue-50 rounded px-1" title="自動値に戻す">↺</button>
                                  )}
                                </div>
                              )}
                            </td>
                            <td className="px-2 py-1.5">
                              {isCustom ? (
                                <input type="text" value={l.unit}
                                  onChange={e => updateCustom(l.customId, 'unit', e.target.value)}
                                  className={editableCell + " w-12 bg-pink-50"} />
                              ) : (
                                <span>{l.unit}</span>
                              )}
                            </td>
                            <td className="px-2 py-1.5 text-right">
                              {isCustom ? (
                                <input type="number" value={l.effectivePrice}
                                  onChange={e => updateCustom(l.customId, 'price', e.target.value)}
                                  className={editableCellNum + " w-24 bg-pink-50 text-pink-700"} />
                              ) : (
                                <div className="flex items-center gap-1 justify-end">
                                  <input type="number"
                                    value={manualVal !== undefined ? manualVal : l.effectivePrice}
                                    onChange={e => editPrice(l.no, e.target.value)}
                                    className={editableCellNum + " w-24 " + priceColor} />
                                  {manualVal !== undefined && (
                                    <button onClick={() => resetManual(l.no)}
                                      className="text-xs text-blue-600 hover:bg-blue-50 rounded px-1" title="自動値に戻す">↺</button>
                                  )}
                                </div>
                              )}
                            </td>
                            <td className="px-2 py-1.5 text-right num font-mono font-semibold">{fmt(l.amount)}</td>
                            <td className="px-2 py-1.5 text-xs text-slate-400 truncate max-w-xs" title={l.quantityFormula || ''}>
                              {isCustom ? <span className="text-pink-500">カスタム</span> : l.quantityFormula}
                            </td>
                            <td className="px-2 py-1.5 text-center">
                              {isCustom && (
                                <button onClick={() => deleteCustom(l.customId)}
                                  className="text-red-500 hover:bg-red-50 rounded px-1.5 py-0.5">×</button>
                              )}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* 凡例 */}
      <div className="mt-3 grid grid-cols-1 md:grid-cols-2 gap-2 text-xs text-slate-600">
        <div className="bg-white rounded p-2 border border-slate-200">
          <div className="font-bold mb-1">セルの色:</div>
          <div className="space-y-0.5">
            <div>・通常: 自動計算値 / 標準単価</div>
            <div>・<span className="text-blue-700 font-bold">青(太字)</span>: 手動編集された数量・単価（↺で自動値に戻せる）</div>
            <div>・<span className="text-pink-700 font-semibold">ピンク</span>: カスタム追加項目</div>
          </div>
        </div>
        <div className="bg-amber-50 rounded p-2 border border-amber-200">
          💡 灰色の枠が付いているセルは編集可能。数量と単価のどちらも上書きできます。チェックを外すと「使用しない」（金額0）。各カテゴリ右上の「＋追加」でカスタム項目を追加できます（自動で次の連番、例: A-10）。「▶」でカテゴリを折りたためます。<br />
          🆕 画面上部の「＋ 新規カテゴリ追加」で<strong>この見積限定の新カテゴリー</strong>を作れます（英字コードは自動採番。例: 既存が AB までなら AC が振られます）。会社全体に追加したい場合はマスタ管理から追加してください。
        </div>
      </div>
    </div>
  );
}

function TabResult({ project, result, companyInfo }) {
  // カテゴリ別合計を集計、本体/付帯/諸経費で分類
  const byGroup = {};
  result.lines.forEach(l => {
    if (!byGroup[l.categoryGroup]) byGroup[l.categoryGroup] = { name: l.categoryName, category: l.category, total: 0 };
    byGroup[l.categoryGroup].total += l.amount;
  });

  // 区分ごとに分類 + 0円カテゴリを除外
  const body = [];
  const side = [];
  const overhead = [];
  Object.entries(byGroup).forEach(([g, info]) => {
    if (info.total <= 0) return; // 0円カテゴリは非表示
    const entry = { ...info, group: g };
    if (info.category === '本体工事') body.push(entry);
    else if (info.category === '付帯工事') side.push(entry);
    else if (info.category === '諸経費') overhead.push(entry);
  });

  const renderSection = (title, items, sectionTotal, colorClass) => {
    if (items.length === 0 && sectionTotal === 0) return null;
    return (
      <div className="mb-4">
        <div className={`text-xs font-bold px-2 py-1 rounded mb-1 ${colorClass}`}>{title}</div>
        <div className="space-y-0.5">
          {items.map(info => (
            <div key={info.group} className="grid grid-cols-[3rem_1fr_auto] items-center py-1 text-xs sm:text-sm">
              <span className="text-slate-500 font-mono">{info.group}.</span>
              <span className="text-slate-700 truncate">{info.name}</span>
              <span className="num font-mono">{fmt(info.total)}</span>
            </div>
          ))}
        </div>
        <div className="grid grid-cols-2 font-bold mt-1 pt-1 border-t border-slate-200 text-sm">
          <span>{title} 計</span>
          <span className="text-right num font-mono">{fmt(sectionTotal)}</span>
        </div>
      </div>
    );
  };

  return (
    <div>
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <div className="lg:col-span-2 bg-white border border-slate-200 rounded-lg p-5">
          <h4 className="text-sm font-bold text-slate-900 mb-3">カテゴリ別小計</h4>
          {renderSection('本体工事', body, result.bodyTotal, 'bg-blue-100 text-blue-900')}
          {renderSection('付帯工事', side, result.sideTotal, 'bg-amber-100 text-amber-900')}
          {renderSection('諸経費', overhead, result.overheadTotal, 'bg-green-100 text-green-900')}
          {result.optionsTotal > 0 && (
            <div className="mb-4">
              <div className="text-xs font-bold px-2 py-1 rounded mb-1 bg-orange-100 text-orange-900">オプション工事</div>
              <div className="grid grid-cols-2 font-bold mt-1 pt-1 border-t border-slate-200 text-sm text-orange-700">
                <span>オプション工事 計</span>
                <span className="text-right num font-mono">{fmt(result.optionsTotal)}</span>
              </div>
            </div>
          )}
        </div>
        <div className="bg-slate-900 text-white rounded-lg p-5 flex flex-col justify-between">
          <div>
            <div className="text-xs text-slate-400 mb-2">税抜合計</div>
            <div className="num text-2xl font-mono font-bold">{fmt(result.subtotal)}</div>
            <div className="text-xs text-slate-400 mt-3 mb-1">消費税(10%)</div>
            <div className="num text-lg font-mono">{fmt(result.tax)}</div>
          </div>
          <div className="border-t border-slate-700 pt-3 mt-3">
            <div className="text-xs text-amber-300 mb-1">税込総合計</div>
            <div className="num text-2xl sm:text-3xl font-mono font-bold text-amber-200">{fmt(result.total)}</div>
            <div className="text-xs text-slate-400 mt-2 num">坪単価: {fmt(result.tsuboCost)} 円/坪</div>
          </div>
        </div>
      </div>
    </div>
  );
}

function PrintPreview({ project, result, companyInfo, onChange }) {
  const format = project.printFormat || 'standard';
  const setFormat = (f) => onChange(p => ({ ...p, printFormat: f }));

  // 有効かつ金額ゼロでない項目のみ集計（カテゴリ単位）
  const byGroup = {};
  result.lines.forEach(l => {
    if (!l.enabled) return;          // 無効項目スキップ
    if (l.amount <= 0) return;        // 0円項目もスキップ
    if (!byGroup[l.categoryGroup]) byGroup[l.categoryGroup] = { name: l.categoryName, category: l.category, total: 0, lines: [] };
    byGroup[l.categoryGroup].total += l.amount;
    byGroup[l.categoryGroup].lines.push(l);
  });
  // 全項目0円のカテゴリも除外（lines数=0なら除外、合計0なら除外）
  // さらに区分(本体/付帯/諸経費)ごとに並べ、新規追加カテゴリも該当区分の末尾に配置
  const filteredByGroup = Object.fromEntries(
    Object.entries(byGroup)
      .filter(([_, info]) => info.lines.length > 0 && info.total > 0)
      .map((entry, i) => ({ entry, i }))
      .sort((a, b) => {
        const ra = sectionRank(a.entry[1].category);
        const rb = sectionRank(b.entry[1].category);
        if (ra !== rb) return ra - rb;
        return a.i - b.i;
      })
      .map(x => x.entry)
  );

  return (
    <div>
      <div className="bg-slate-100 px-4 py-3 flex justify-between items-center no-print flex-wrap gap-2">
        <div className="flex items-center gap-3 flex-wrap">
          <span className="text-sm text-slate-600">📄 見積書プレビュー</span>
          <select value={format} onChange={e => setFormat(e.target.value)}
            className="border border-slate-300 bg-white rounded px-2 py-1 text-sm">
            <option value="standard">① シンプル（集計のみ）</option>
            <option value="detailed">② 内訳付き（カテゴリ別小計＋全内訳）</option>
            <option value="formal">③ 正式見積書（押印欄付き・罫線多め）</option>
          </select>
          <span className="text-xs text-slate-500">💡 PDF保存はブラウザの「印刷」→「PDFとして保存」で可能</span>
        </div>
        <button onClick={() => window.print()} className="px-4 py-2 text-sm bg-slate-900 text-white rounded hover:bg-slate-700">🖨 印刷</button>
      </div>

      {format === 'standard' && <FormatStandard project={project} result={result} companyInfo={companyInfo} byGroup={filteredByGroup} />}
      {format === 'detailed' && <FormatDetailed project={project} result={result} companyInfo={companyInfo} byGroup={filteredByGroup} />}
      {format === 'formal' && <FormatFormal project={project} result={result} companyInfo={companyInfo} byGroup={filteredByGroup} />}
    </div>
  );
}

// ============ 共通モーダル: カテゴリ追加 ============
function CategoryAddModal({ open, title, scope, existingNames, nextCode, onCancel, onConfirm }) {
  const [name, setName] = useState('');
  const [category, setCategory] = useState('本体工事');
  const inputRef = useRef(null);
  useEffect(() => {
    if (open) {
      setName('');
      setCategory('本体工事');
      // 次のティックで autoFocus を効かせる
      setTimeout(() => inputRef.current?.focus(), 30);
    }
  }, [open]);

  if (!open) return null;
  const trimmed = name.trim();
  const canSubmit = trimmed.length > 0;
  const dup = trimmed && existingNames && existingNames.includes(trimmed);

  const submit = () => { if (canSubmit) onConfirm(trimmed, category); };
  const handleKey = (e) => {
    if (e.key === 'Escape') { e.preventDefault(); onCancel(); }
    else if (e.key === 'Enter' && canSubmit) { e.preventDefault(); submit(); }
  };

  return (
    <div className="fixed inset-0 bg-slate-900/30 z-50 flex items-center justify-center p-4 no-print"
      onClick={onCancel} onKeyDown={handleKey}>
      <div className="bg-white rounded-md shadow-lg max-w-sm w-full border border-slate-300"
        onClick={e => e.stopPropagation()}>
        {/* ヘッダー */}
        <div className="px-4 py-2.5 border-b border-slate-200 flex items-center justify-between">
          <div>
            <h3 className="text-sm font-bold text-slate-900">{title}</h3>
            {scope && <p className="text-xs text-slate-500 mt-0.5">{scope}</p>}
          </div>
          <button onClick={onCancel} type="button"
            className="text-slate-400 hover:text-slate-700 text-lg leading-none w-6 h-6 flex items-center justify-center"
            aria-label="閉じる">×</button>
        </div>

        {/* 本文 */}
        <div className="px-4 py-3 space-y-3">
          <div>
            <label className="block text-xs text-slate-600 mb-1">カテゴリー名</label>
            <input ref={inputRef} type="text" value={name} onChange={e => setName(e.target.value)}
              onKeyDown={handleKey}
              placeholder="例: 太陽光発電"
              className="w-full border border-slate-300 rounded px-2 py-1.5 text-sm focus:outline-none focus:border-slate-500" />
            {dup && (
              <p className="mt-1 text-xs text-slate-500">同名のカテゴリーが既に存在します（別コードで追加されます）</p>
            )}
          </div>

          <div>
            <label className="block text-xs text-slate-600 mb-1">区分</label>
            <select value={category} onChange={e => setCategory(e.target.value)}
              className="w-full border border-slate-300 rounded px-2 py-1.5 text-sm focus:outline-none focus:border-slate-500 bg-white">
              <option value="本体工事">本体工事</option>
              <option value="付帯工事">付帯工事</option>
              <option value="諸経費">諸経費</option>
            </select>
          </div>

          <div className="text-xs text-slate-500">
            付与コード: <span className="font-mono text-slate-700">{nextCode}</span>
          </div>
        </div>

        {/* フッター */}
        <div className="px-4 py-2.5 border-t border-slate-200 flex gap-2 justify-end">
          <button onClick={onCancel} type="button"
            className="px-3 py-1 text-sm text-slate-600 hover:text-slate-900">キャンセル</button>
          <button onClick={submit} disabled={!canSubmit} type="button"
            className={`px-3 py-1 text-sm rounded ${canSubmit ? 'bg-slate-800 text-white hover:bg-slate-900' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
            追加
          </button>
        </div>
      </div>
    </div>
  );
}

function MasterManager({ masters, setMasters }) {
